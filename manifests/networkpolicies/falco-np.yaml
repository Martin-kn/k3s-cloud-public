---
# deny-all in falco namespace.
# Falco runs with privileged: true + hostNetwork: true + hostPID: true.
# It is the most privileged pod in the cluster. If compromised,
# the attacker has full host access. This NetworkPolicy
# contains the damage at the network level: no lateral movement,
# no exfiltration, no C2.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all
  namespace: falco
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
# Allow Prometheus to scrape metrics from Falco webserver (port 8765).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus
  namespace: falco
spec:
  podSelector: {}
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
---
# Allow egress to K8s API (443) + DNS (53).
# Falco needs to report events and create resources.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-k8s-api-dns
  namespace: falco
spec:
  podSelector: {}
  egress:
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
      ports:
        - port: 443
          protocol: TCP
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Allow egress to Falcosidekick (when deployed) on local port 2801.
# Falco forwards events to Falcosidekick via webhook.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-falcosidekick
  namespace: falco
spec:
  podSelector: {}
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: falcosidekick
      ports:
        - port: 2801
          protocol: TCP
