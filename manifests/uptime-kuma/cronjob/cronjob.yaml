apiVersion: v1
kind: ServiceAccount
metadata:
  name: monitor-sync
  namespace: uptime-kuma
  labels:
    app: monitor-sync
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: monitor-sync
  namespace: uptime-kuma
  labels:
    app: monitor-sync
spec:
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 300
      template:
        spec:
          serviceAccountName: monitor-sync
          restartPolicy: Never
          containers:
            - name: sync
              image: python:3.12-slim
              command:
                - python3
                - /scripts/sync-monitors.py
              env:
                - name: KUMA_URL
                  value: "http://uptime-kuma:3001"
                - name: KUMA_USER
                  value: "admin"
                - name: KUMA_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: autokuma-credentials
                      key: password
              volumeMounts:
                - mountPath: /scripts
                  name: scripts
                - mountPath: /config
                  name: monitors
              resources:
                limits:
                  memory: 128Mi
                  cpu: 200m
                requests:
                  memory: 64Mi
                  cpu: 100m
          volumes:
            - name: scripts
              configMap:
                name: monitor-sync
                items:
                  - key: sync-monitors.py
                    path: sync-monitors.py
                    mode: 0755
            - name: monitors
              configMap:
                name: monitor-sync
                items:
                  - key: monitors.json
                    path: monitors.json
