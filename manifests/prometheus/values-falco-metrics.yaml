falco:
  json_output: true
  http_output:
    enabled: true
    url: http://falcosidekick.falco.svc:2801/
  webserver:
    enabled: true
    listen_port: 8765
    prometheus_metrics_enabled: true
  rules:
    - rule: Contact K8S API Server From Container
      append: true
      condition: and not (k8s.pod.name startswith "node-agent" and k8s.ns.name = "kubescape")
falcoctl:
  artifact:
    install:
      enabled: true
      refs: [falco-rules:5, container:0.7.1]
metrics:
  enabled: true
  interval: 30m
