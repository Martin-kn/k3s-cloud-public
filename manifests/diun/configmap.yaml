apiVersion: v1
kind: ConfigMap
metadata:
  name: diun
  namespace: diun
data:
  diun.yml: |
    watch:
      workers: 20
      schedule: "0 0 * * * *"
      firstCheckNotif: false
    providers:
      # ARM64 workaround:
      # Diun official builds (crazymax/diun:latest) do NOT include the kubernetes
      # provider for arm64. The binary runs but returns 0 images.
      # Using file provider instead; image list is generated by an init container.
      #
      # For non-ARM (amd64), replace with:
      # providers:
      #   kubernetes: {}
      # And remove the init container from deployment.yaml.
      file:
        directory: /images
    notif:
      ntfy:
        endpoint: http://ntfy.ntfy.svc.cluster.local
        topic: diun
        priority: 3
        timeout: 10s
